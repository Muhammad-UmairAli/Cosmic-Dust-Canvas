# Pre-commit hooks for projects using claude-orchestration-kit.
#
# One-time setup per developer machine:
#   pip install pre-commit
#   pre-commit install
#
# The kit's setup-integrations.sh wizard offers to do this for you.
#
# After that, every `git commit` runs the hooks below before the commit
# is created. Push the failing fix as a normal commit; do NOT bypass
# with --no-verify — fix the issue and re-commit.
#
# The same hooks run in CI via .github/workflows/ci.yml on every PR.
# See docs/methodology/04-code-quality-and-gates.md for the full discipline.
#
# This config is the generic baseline. Add language-/tool-specific hooks
# (ruff for Python, hadolint for Dockerfiles, etc.) as your stack solidifies.

repos:
  # ── Standard hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # Phase docs sometimes contain intentional trailing spaces (Markdown
        # line breaks). Add patterns here as your project accumulates.
        exclude: ^docs/phases/.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Markdown / YAML / JSON formatting ────────────────────────────────────
  # mirrors-prettier is deprecated; its v4 alpha errors with "No files matching
  # the given patterns were found" whenever its passed file list resolves
  # entirely through .prettierignore (e.g. a commit touching only ignored md +
  # one docs/phases doc). Use a self-contained local hook on a pinned stable
  # prettier instead. It still reads .prettierrc + .prettierignore from the repo
  # root; --ignore-unknown skips unparseable types rather than failing the run.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: node
        additional_dependencies: ['prettier@3.8.4']
        types_or: [markdown, yaml, json]
        # Workflow YAMLs use GitHub-Actions-flavored syntax; let actionlint
        # govern those instead of prettier.
        exclude: ^\.github/workflows/

  # ── GitHub Actions YAML lint ─────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ── Secrets detection (uncomment to enable) ─────────────────────────────
  # Catches accidental commits of API keys, tokens, connection strings.
  # Setup: pip install detect-secrets && detect-secrets scan > .secrets.baseline
  # then commit the baseline. After that, only NEW secrets fail the hook.
  #
  # - repo: https://github.com/Yelp/detect-secrets
  #   rev: v1.5.0
  #   hooks:
  #     - id: detect-secrets
  #       args: [--baseline, .secrets.baseline]
  #       exclude: ^\.secrets\.baseline$
