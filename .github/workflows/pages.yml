name: Deploy demo to GitHub Pages

# Builds the interactive playground (demo/) and publishes it to GitHub Pages.
# Runs on push to main (i.e. on release merges under Git Flow) and on manual
# dispatch. Requires Pages to be enabled for the repo with "GitHub Actions" as
# the source (Settings → Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: only what deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; don't cancel an in-progress one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run demo:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
